</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col antialiased selection:bg-emerald-500 selection:text-slate-950">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Custom Notification / Alert Banner instead of native alerts
        const Notification = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 4000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const bgClass = type === 'success' ? 'bg-emerald-950 border-emerald-500 text-emerald-200' :
                            type === 'error' ? 'bg-rose-950 border-rose-500 text-rose-200' :
                            'bg-indigo-950 border-indigo-500 text-indigo-200';

            return (
                <div className={`fixed bottom-4 right-4 z-50 flex items-center gap-3 px-4 py-3 rounded-xl border shadow-2xl transition-all duration-300 transform translate-y-0 ${bgClass}`}>
                    <span className="text-sm font-medium">{message}</span>
                    <button onClick={onClose} className="hover:opacity-75 focus:outline-none">
                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            );
        };

        // Standard Strategy Templates to initialize empty local storage with premium material
        const defaultSetups = [
            {
                id: '1',
                name: "The Breakout & Retest",
                timeframe: "15m / 1h",
                type: "Trend Continuation",
                description: "Identify clear horizontal or diagonal resistance. Wait for a strong high-volume close above it, then trigger on the first touch of the breakout level acting as new support.",
                indicators: "20 EMA (Directional Bias), Volume, ATR (for Stops)",
                entryTriggers: "1. Strong volume expansion breakout.\n2. Limit order at the previous resistance level.\n3. Bullish pinbar or engulfing candle confirming the retest support.",
                exitRules: "Stop Loss placed just below the breakout swing low. Take profit at 1:2 Minimum Risk-to-Reward, or the next major key psychological level.",
                winRate: 62
            },
            {
                id: '2',
                name: "Liquidity Sweep & Reversal",
                timeframe: "5m / 15m",
                type: "Counter-Trend / Mean Reversion",
                description: "Identify key session highs/lows or previous day highs/lows. Wait for price to briefly pierce this level to trigger sell-stops or buy-stops, then quickly close back inside.",
                indicators: "Session Highs/Lows, Volume Profile, RSI (Overbought/Oversold divergence)",
                entryTriggers: "1. Price sweeps key liquidity pool.\n2. Closes back inside the range within 1-2 candles.\n3. Market order immediately upon confirmation of the close.",
                exitRules: "Stop Loss set 1-2 pips/points beyond the sweep high/low candle. Take Profit set at the mid-range (1:1.5) and dynamic targets at the opposite side of the range.",
                winRate: 55
            }
        ];

        const defaultRules = [
            { id: '1', content: "Never risk more than 1.5% of total account equity per trade.", category: "risk" },
            { id: '2', content: "Walk away for the day after 2 consecutive losses.", category: "psychology" },
            { id: '3', content: "Never chase a missed entry. Wait for the retest or look for another asset.", category: "execution" },
            { id: '4', content: "Always trade with a hard stop loss placed at the broker instantly upon entry.", category: "risk" },
            { id: '5', content: "Review and log every single trade with notes and reflections.", category: "psychology" }
        ];

        const defaultChecklist = [
            { id: 'c1', task: "Check the high-impact economic news calendar (ForexFactory / TradingView). No trades within 30m of red folder events.", phase: "pre", done: false },
            { id: 'c2', task: "Identify macro structure on 4H/Daily charts (Establish directional bias).", phase: "pre", done: false },
            { id: 'c3', task: "Draw key support/resistance zones and liquidity ranges.", phase: "pre", done: false },
            { id: 'c4', task: "Verify Stop Loss and Take Profit levels have been calculated strictly via the Risk Calculator.", phase: "execution", done: false },
            { id: 'c5', task: "Wait patiently for your setup to hit your point of interest. NO front-running.", phase: "execution", done: false },
            { id: 'c6', task: "Capture dynamic screenshots of the entry pattern and chart setup.", phase: "post", done: false },
            { id: 'c7', task: "Add completed trade to the Trading Journal with emotional state logs.", phase: "post", done: false }
        ];

        const defaultJournal = [
            { id: 'j1', date: "2026-07-01", asset: "EURUSD", type: "LONG", setup: "The Breakout & Retest", riskReward: 2.2, outcome: "WIN", profit: 330, notes: "Perfect execution. Retest hit the 20 EMA." },
            { id: 'j2', date: "2026-07-03", asset: "BTCUSD", type: "SHORT", setup: "Liquidity Sweep & Reversal", riskReward: 1.8, outcome: "LOSS", profit: -150, notes: "Rushed the entry before the 15m confirmation." },
            { id: 'j3', date: "2026-07-06", asset: "AAPL", type: "LONG", setup: "The Breakout & Retest", riskReward: 2.5, outcome: "WIN", profit: 500, notes: "Strong momentum move. Kept trailing stop." }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [notif, setNotif] = useState(null);

            // LocalStorage Sync for Playbook App state
            const [setups, setSetups] = useState(() => {
                const saved = localStorage.getItem('trader_setups');
                return saved ? JSON.parse(saved) : defaultSetups;
            });

            const [rules, setRules] = useState(() => {
                const saved = localStorage.getItem('trader_rules');
                return saved ? JSON.parse(saved) : defaultRules;
            });

            const [checklist, setChecklist] = useState(() => {
                const saved = localStorage.getItem('trader_checklist');
                return saved ? JSON.parse(saved) : defaultChecklist;
            });

            const [journal, setJournal] = useState(() => {
                const saved = localStorage.getItem('trader_journal');
                return saved ? JSON.parse(saved) : defaultJournal;
            });

            // Sync with localstorage whenever state changes
            useEffect(() => {
                localStorage.setItem('trader_setups', JSON.stringify(setups));
            }, [setups]);

            useEffect(() => {
                localStorage.setItem('trader_rules', JSON.stringify(rules));
            }, [rules]);

            useEffect(() => {
                localStorage.setItem('trader_checklist', JSON.stringify(checklist));
            }, [checklist]);

            useEffect(() => {
                localStorage.setItem('trader_journal', JSON.stringify(journal));
            }, [journal]);

            const triggerNotif = (message, type = 'success') => {
                setNotif({ message, type });
            };

            return (
                <div className="flex flex-col md:flex-row min-h-screen">
                    {/* SIDEBAR NAVIGATION */}
                    <aside className="w-full md:w-64 bg-slate-900 border-b md:border-b-0 md:border-r border-slate-800 flex flex-col justify-between flex-shrink-0">
                        <div>
                            {/* Brand Header */}
                            <div className="p-6 border-b border-slate-800">
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-gradient-to-tr from-emerald-600 to-teal-500 rounded-lg shadow-lg">
                                        <svg className="w-6 h-6 text-slate-950" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                                        </svg>
                                    </div>
                                    <div>
                                        <h1 className="text-lg font-bold tracking-tight bg-gradient-to-r from-emerald-400 to-teal-300 bg-clip-text text-transparent">QUANTUM</h1>
                                        <span className="text-xs text-slate-400 font-medium">Strategy & Playbook</span>
                                    </div>
                                </div>
                            </div>

                            {/* Nav Items */}
                            <nav className="p-4 space-y-1.5">
                                <button
                                    onClick={() => setActiveTab('dashboard')}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all ${
                                        activeTab === 'dashboard'
                                            ? 'bg-slate-800 text-emerald-400 border-l-4 border-emerald-500 shadow-md'
                                            : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50'
                                    }`}
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6z" />
                                    </svg>
                                    Dashboard
                                </button>

                                <button
                                    onClick={() => setActiveTab('playbook')}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all ${
                                        activeTab === 'playbook'
                                            ? 'bg-slate-800 text-emerald-400 border-l-4 border-emerald-500 shadow-md'
                                            : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50'
                                    }`}
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                                    </svg>
                                    Setups Playbook
                                </button>

                                <button
                                    onClick={() => setActiveTab('volstrategy')}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all ${
                                        activeTab === 'volstrategy'
                                            ? 'bg-slate-800 text-cyan-400 border-l-4 border-cyan-500 shadow-md'
                                            : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50'
                                    }`}
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                                    </svg>
                                    Volatility Strategy Lab
                                </button>

                                <button
                                    onClick={() => setActiveTab('sandbox')}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all ${
                                        activeTab === 'sandbox'
                                            ? 'bg-slate-800 text-emerald-400 border-l-4 border-emerald-500 shadow-md'
                                            : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50'
                                    }`}
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                    </svg>
                                    Chart Sandbox
                                </button>

                                <button
                                    onClick={() => setActiveTab('calculator')}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all ${
                                        activeTab === 'calculator'
                                            ? 'bg-slate-800 text-emerald-400 border-l-4 border-emerald-500 shadow-md'
                                            : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50'
                                    }`}
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                                    </svg>
                                    Risk & Size Tools
                                </button>

                                <button
                                    onClick={() => setActiveTab('journal')}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all ${
                                        activeTab === 'journal'
                                            ? 'bg-slate-800 text-emerald-400 border-l-4 border-emerald-500 shadow-md'
                                            : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50'
                                    }`}
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                                    </svg>
                                    Trading Journal
                                </button>

                                <button
                                    onClick={() => setActiveTab('routines')}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all ${
                                        activeTab === 'routines'
                                            ? 'bg-slate-800 text-emerald-400 border-l-4 border-emerald-500 shadow-md'
                                            : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50'
                                    }`}
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                                    </svg>
                                    Habits & Rules
                                </button>
                            </nav>
                        </div>

                        {/* Status Guardrail Indicator */}
                        <div className="p-4 border-t border-slate-800 bg-slate-900/60">
                            <div className="flex items-center justify-between p-3 rounded-xl bg-amber-500/10 border border-amber-500/20">
                                <div className="flex items-center gap-2">
                                    <div className="w-2.5 h-2.5 bg-amber-500 rounded-full animate-pulse" />
                                    <span className="text-xs font-semibold text-amber-300">TRADING PAUSED</span>
                                </div>
                                <span className="text-[10px] text-slate-400">Playbook Active</span>
                            </div>
                        </div>
                    </aside>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-8">
                        {activeTab === 'dashboard' && (
                            <DashboardView
                                setups={setups}
                                rules={rules}
                                setRules={setRules}
                                journal={journal}
                                setJournal={setJournal}
                                checklist={checklist}
                                triggerNotif={triggerNotif}
                            />
                        )}

                        {activeTab === 'playbook' && (
                            <PlaybookView
                                setups={setups}
                                setSetups={setSetups}
                                triggerNotif={triggerNotif}
                            />
                        )}

                        {activeTab === 'volstrategy' && (
                            <VolatilityStrategyView
                                triggerNotif={triggerNotif}
                            />
                        )}

                        {activeTab === 'sandbox' && (
                            <SandboxView
                                setups={setups}
                                triggerNotif={triggerNotif}
                            />
                        )}

                        {activeTab === 'calculator' && (
                            <CalculatorView
                                triggerNotif={triggerNotif}
                            />
                        )}

                        {activeTab === 'journal' && (
                            <JournalView
                                journal={journal}
                                setJournal={setJournal}
                                setups={setups}
                                triggerNotif={triggerNotif}
                            />
                        )}

                        {activeTab === 'routines' && (
                            <RoutinesView
                                checklist={checklist}
                                setChecklist={setChecklist}
                                rules={rules}
                                setRules={setRules}
                                triggerNotif={triggerNotif}
                            />
                        )}
                    </main>

                    {notif && (
                        <Notification
                            message={notif.message}
                            type={notif.type}
                            onClose={() => setNotif(null)}
                        />
                    )}
                </div>
            );
        }

        function DashboardView({ setups, rules, setRules, journal, checklist, triggerNotif }) {
            const [newRule, setNewRule] = useState("");
            const [ruleCategory, setRuleCategory] = useState("risk");

            // Calculate metrics derived dynamically from Trading Journal state
            const metrics = useMemo(() => {
                if (journal.length === 0) return { winRate: 0, totalPnl: 0, profitFactor: 0, totalTrades: 0, avgRr: 0 };
                const wins = journal.filter(j => j.outcome === 'WIN');
                const losses = journal.filter(j => j.outcome === 'LOSS');
                const winRate = Math.round((wins.length / journal.length) * 100);
                const totalPnl = journal.reduce((sum, j) => sum + j.profit, 0);

                const totalWinAmt = wins.reduce((sum, j) => sum + j.profit, 0);
                const totalLossAmt = Math.abs(losses.reduce((sum, j) => sum + j.profit, 0));
                const profitFactor = totalLossAmt === 0 ? totalWinAmt.toFixed(2) : (totalWinAmt / totalLossAmt).toFixed(2);

                const avgRr = (journal.reduce((sum, j) => sum + j.riskReward, 0) / journal.length).toFixed(1);

                return { winRate, totalPnl, profitFactor, totalTrades: journal.length, avgRr };
            }, [journal]);

            const handleAddRule = (e) => {
                e.preventDefault();
                if (!newRule.trim()) return;
                const fresh = { id: Date.now().toString(), content: newRule.trim(), category: ruleCategory };
                setRules([...rules, fresh]);
                setNewRule("");
                triggerNotif("Rule pinned to Dashboard successfully", "success");
            };

            const handleDeleteRule = (id) => {
                setRules(rules.filter(r => r.id !== id));
                triggerNotif("Rule removed from playbook", "info");
            };

            const checklistCompletion = useMemo(() => {
                if (checklist.length === 0) return 0;
                const completed = checklist.filter(c => c.done).length;
                return Math.round((completed / checklist.length) * 100);
            }, [checklist]);

            return (
                <div className="space-y-8 max-w-7xl mx-auto">
                    {/* Header */}
                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-slate-800 pb-6">
                        <div>
                            <span className="text-xs font-bold text-emerald-400 tracking-wider uppercase">Strategic Command Overview</span>
                            <h2 className="text-3xl font-extrabold tracking-tight text-white mt-1">Operational Command</h2>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="px-4 py-2 bg-slate-900 border border-slate-800 rounded-xl text-xs flex items-center gap-2">
                                <span className="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
                                Local Data Protected
                            </div>
                        </div>
                    </div>

                    {/* Stats Blocks */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 relative overflow-hidden group hover:border-slate-700 transition">
                            <div className="flex items-center justify-between">
                                <span className="text-xs font-bold uppercase text-slate-400">Total Playbook Trades</span>
                                <span className="text-slate-500"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg></span>
                            </div>
                            <p className="text-3xl font-extrabold text-white mt-2 code-font">{metrics.totalTrades}</p>
                            <span className="text-xs text-slate-500 mt-1 block">Live simulated database stats</span>
                        </div>

                        <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 relative overflow-hidden group hover:border-slate-700 transition">
                            <div className="flex items-center justify-between">
                                <span className="text-xs font-bold uppercase text-slate-400">Win Rate</span>
                                <span className={`text-xs font-bold px-2 py-0.5 rounded ${metrics.winRate >= 50 ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'}`}>
                                    {metrics.winRate}%
                                </span>
                            </div>
                            <p className="text-3xl font-extrabold text-white mt-2 code-font">{metrics.winRate}%</p>
                            <div className="w-full bg-slate-800 h-1.5 rounded-full mt-3 overflow-hidden">
                                <div className="bg-emerald-500 h-full rounded-full transition-all duration-500" style={{ width: `${metrics.winRate}%` }}></div>
                            </div>
                        </div>

                        <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 relative overflow-hidden group hover:border-slate-700 transition">
                            <div className="flex items-center justify-between">
                                <span className="text-xs font-bold uppercase text-slate-400">Profit Factor</span>
                                <span className="text-slate-500"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg></span>

                                                <span>1 : {params.riskReward}</span>
                                            </label>
                                            <input type="range" name="riskReward" min="1.0" max="5.0" step="0.5" value={params.riskReward} onChange={handleParamChange} className="w-full accent-emerald-500" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-blue-900/10 border border-blue-900/30 p-4 rounded-xl flex items-start gap-3">
                                <svg className="w-4 h-4 text-blue-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                <p className="text-xs text-blue-200/70 leading-relaxed">
                                    Updates made here instantly rewire the Pine Script execution logic. Copy the code into TradingView to backtest.
                                </p>
                            </div>
                        </div>

                        {/* Right Content Area */}
                        <div className="lg:col-span-8">
                            {activeTab === 'visualizer' && (
                                <div className="bg-slate-800/50 border border-slate-700 p-6 rounded-xl">
                                    <h3 className="text-xl font-bold text-slate-200 mb-6 flex items-center gap-2">
                                        <svg className="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                                        Anatomy of a Bullish Volatility Sweep
                                    </h3>
                                    
                                    <div className="relative w-full h-[450px] bg-slate-900 rounded-lg border border-slate-700 overflow-hidden flex flex-col items-center justify-start p-4">
                                        <svg viewBox="0 0 800 450" className="w-full h-full">
                                            {/* EMA Line */}
                                            <path d="M 50 250 Q 300 220 500 240 T 750 180" fill="none" stroke="#eab308" strokeWidth="3" strokeDasharray="6 4" opacity="0.8" />
                                            <text x="60" y="240" fill="#eab308" fontSize="12" fontWeight="bold">EMA 20 Dynamic Support</text>

                                            {/* Box definition */}
                                            <rect x="100" y="80" width="300" height="130" fill="rgba(59, 130, 246, 0.1)" stroke="#3b82f6" strokeWidth="2" strokeDasharray="4 4" />
                                            <text x="110" y="70" fill="#94a3b8" fontSize="14" fontWeight="bold">BB Contraction Box</text>
                                            
                                            {/* Range candles */}
                                            <g>
                                                <line x1="120" y1="90" x2="120" y2="190" stroke="#cbd5e1" strokeWidth="2"/>
                                                <rect x="115" y="110" width="10" height="40" fill="#22c55e" />
                                                <line x1="165" y1="105" x2="165" y2="185" stroke="#cbd5e1" strokeWidth="2"/>
                                                <rect x="160" y="125" width="10" height="35" fill="#ef4444" />
                                                <line x1="210" y1="95" x2="210" y2="188" stroke="#cbd5e1" strokeWidth="2"/>
                                                <rect x="205" y="120" width="10" height="45" fill="#22c55e" />
                                            </g>

                                            {/* The Sweep Candle */}
                                            <g transform="translate(420, -20)">
                                                <line x1="0" y1="120" x2="0" y2="300" stroke="#cbd5e1" strokeWidth="3"/>
                                                <rect x="-10" y="190" width="20" height="40" fill="#22c55e" />
                                                <path d="M -20 280 Q -70 280 -70 240" fill="none" stroke="#f472b6" strokeWidth="2" />
                                                <text x="-150" y="235" fill="#f472b6" fontSize="12" fontWeight="bold">Liquidity Sweep Wick</text>
                                                <line x1="-30" y1="315" x2="30" y2="315" stroke="#ef4444" strokeWidth="2" strokeDasharray="2 2"/>
                                                <text x="40" y="320" fill="#ef4444" fontSize="12">Stop = Wick Ext. + Buffer</text>
                                            </g>

                                            {/* Target */}
                                            <line x1="400" y1="40" x2="600" y2="40" stroke="#22c55e" strokeWidth="2" strokeDasharray="4 4"/>
                                            <text x="610" y="45" fill="#22c55e" fontSize="14" fontWeight="bold">Take Profit (2x Risk)</text>
                                            <path d="M 420 150 Q 500 150 500 50" fill="none" stroke="#22c55e" strokeWidth="2" />

                                            {/* Volume Sub-Chart */}
                                            <line x1="50" y1="350" x2="750" y2="350" stroke="#334155" strokeWidth="1" />
                                            <text x="60" y="340" fill="#94a3b8" fontSize="12" fontWeight="bold">Volume SMA</text>
                                            <path d="M 50 400 Q 200 405 400 395 T 750 400" fill="none" stroke="#64748b" strokeWidth="2" strokeDasharray="4 4" />
                                            
                                            {/* Spike Volume Bar */}
                                            <rect x="416" y="360" width="8" height="70" fill="#a855f7" />
                                            <text x="430" y="375" fill="#a855f7" fontSize="12" fontWeight="bold">Volume Spike ({params.volMultiplier}x)</text>
                                        </svg>
                                    </div>

                                    {/* Breakdown Text */}
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">
                                        <div className="bg-slate-900/50 p-4 rounded-lg border border-slate-700">
                                            <h4 className="text-cyan-400 font-bold text-sm mb-2 flex items-center gap-2">1. The Box</h4>
                                            <p className="text-xs text-slate-300">BB Width falls into the tightest {params.bbContractionThreshold}% of its {params.bbContractionLookback}-bar history, creating a trapped energy box.</p>
                                        </div>
                                        <div className="bg-slate-900/50 p-4 rounded-lg border border-slate-700">
                                            <h4 className="text-fuchsia-400 font-bold text-sm mb-2 flex items-center gap-2">2. The Sweep</h4>
                                            <p className="text-xs text-slate-300">A wick pierces the box limit and price rejects back inside on a {params.volMultiplier}x Volume climax, trapping breakout traders.</p>
                                        </div>
                                        <div className="bg-slate-900/50 p-4 rounded-lg border border-slate-700">
                                            <h4 className="text-emerald-400 font-bold text-sm mb-2 flex items-center gap-2">3. Confluence</h4>
                                            <p className="text-xs text-slate-300">RSI confirms extremes.{params.requireDivergence ? ' Divergence required.' : ''} EMA 20 acts as directional confirmation.</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'code' && (
                                <div className="bg-[#0d1117] border border-slate-800 rounded-xl overflow-hidden shadow-2xl animate-in fade-in duration-300">
                                    <div className="bg-slate-900/80 px-4 py-3 border-b border-slate-800 flex justify-between items-center">
                                        <div className="flex items-center gap-2">
                                            <svg className="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" /></svg>
                                            <span className="text-sm font-medium text-slate-300">volatility_sweep.pine</span>
                                        </div>
                                        <button 
                                            onClick={handleCopy}
                                            className={`flex items-center gap-2 px-3 py-1.5 rounded text-xs font-medium transition-all ${copied ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}
                                        >
                                            {copied ? (
                                                <>
                                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" /></svg>
                                                    Copied!
                                                </>
                                            ) : (
                                                <>
                                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                                                    Copy Code
                                                </>
                                            )}
                                        </button>
                                    </div>
                                    <div className="p-4 overflow-x-auto h-[650px] overflow-y-auto custom-scrollbar">
                                        <pre className="text-[12px] text-slate-300 font-mono leading-relaxed">
                                            <code>{generatePineScript()}</code>
                                        </pre>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Render App
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
